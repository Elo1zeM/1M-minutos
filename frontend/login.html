function atualizarUnidades() {
    const estadoSelecionado = document.getElementById('login-estado').value;
    const selectUnidade = document.getElementById('login-unidade');
    
    if (estadoSelecionado && unidadesPorEstado[estadoSelecionado]) {
        selectUnidade.disabled = false;
        selectUnidade.innerHTML = '<option value="" disabled selected class="text-gray-400">Selecione sua unidade...</option>' + unidadesPorEstado[estadoSelecionado];
    } else {
        selectUnidade.disabled = true;
        selectUnidade.innerHTML = '<option value="" disabled selected class="text-gray-400">Selecione o estado primeiro...</option>';
    }
}

    <script>
        const API_URL = 'https://backmin.vercel.app/api'; 

        async function fazerLogin() {
            const identificacao = document.getElementById('login-identificacao').value.trim();
            const senha = document.getElementById('login-senha').value.trim();
            const unidade = document.getElementById('login-unidade').value;
            const turma = document.getElementById('login-turma').value.trim();
            
            const alertDiv = document.getElementById('login-alert');
            const alertText = document.getElementById('alert-text');

            alertDiv.classList.add('hidden');

            if (!identificacao || !senha || !unidade || !turma) {
                alertText.innerText = "Por favor, preencha todos os campos obrigatórios.";
                alertDiv.classList.remove('hidden');
                
                alertDiv.classList.add('animate-bounce');
                setTimeout(() => alertDiv.classList.remove('animate-bounce'), 1000);
                return;
            }

            try {
                const btnSubmit = document.querySelector('button[type="submit"]');
                btnSubmit.innerText = "CARREGANDO...";
                btnSubmit.classList.add('opacity-80', 'cursor-not-allowed');

                // Salva o RM no localStorage para a página registrar.html poder ler depois
                localStorage.setItem('aluno_rm', identificacao);

                /* Descomente quando a API estiver 100% integrada
                const response = await fetch(`${API_URL}/login`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rm: identificacao, senha: senha, unidade: unidade, turma: turma })
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || 'Credenciais inválidas.');
                localStorage.setItem('aluno_token', result.token);
                */

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 800);

            } catch (error) {
                alertText.innerText = error.message;
                alertDiv.classList.remove('hidden');
                
                const btnSubmit = document.querySelector('button[type="submit"]');
                btnSubmit.innerText = "ENTRAR NA CONTA";
                btnSubmit.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Se o aluno já estiver logado, joga pro painel direto
            if (localStorage.getItem('aluno_token')) {
                window.location.href = 'index.html';
            }
        });
    </script>
