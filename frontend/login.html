<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Integração SESI-SENAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-blue-50 via-[#E3F2FD] to-blue-100 min-h-screen flex flex-col text-gray-800 m-0 p-0 bg-no-repeat bg-fixed">

    <header class="bg-gradient-to-r from-[#2C558A] to-[#5BA3F6] border-t-[8px] border-[#282D35] w-full py-7 text-center text-white shadow-md">
        <h2 class="text-[13px] md:text-sm font-semibold tracking-[0.25em] text-blue-100 uppercase mb-2">Integração Sesi-Senai</h2>
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight drop-shadow-md">1 Milhão de Minutos de Leitura</h1>
    </header>

    <main class="flex-1 flex items-center justify-center p-6 w-full max-w-5xl mx-auto gap-8 lg:gap-16">
        
        <div class="bg-white/80 backdrop-blur-lg p-8 md:p-10 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-white w-full max-w-md relative transition-all duration-300">
            
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-blue-900 mb-2">Acesse sua Conta</h2>
                <p class="text-sm text-gray-600">Insira seus dados abaixo para entrar no painel de leitura.</p>
            </div>

            <div id="login-alert" class="hidden mb-6 p-4 rounded-lg relative text-sm shadow-sm border-l-4 bg-red-50 border-red-500 text-red-700" role="alert">
                <span class="block sm:inline font-medium" id="alert-text"></span>
            </div>

            <form id="login-form" onsubmit="event.preventDefault(); fazerLogin();" class="space-y-5">
                <div>
                    <label for="login-identificacao" class="block text-sm font-semibold text-blue-900 mb-1.5 ml-1">
                        E-mail Institucional ou RM
                    </label>
                    <input type="text" id="login-identificacao" placeholder="exemplo@aluno.senai.br/@portalsesisp.org.br ou RM" 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none transition-all bg-gray-50/50 text-gray-700 placeholder-gray-400 shadow-sm" required>
                </div>

                <div class="relative">
                    <div class="flex justify-between items-center mb-1.5 ml-1">
                        <label for="login-senha" class="block text-sm font-semibold text-blue-900">Senha</label>
                        <a href="esqueceu.html" class="text-xs font-semibold text-blue-600 hover:text-blue-800 transition-colors">Esqueceu a senha?</a>
                    </div>
                    <input type="password" id="login-senha" placeholder="••••••••" 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none transition-all bg-gray-50/50 text-gray-700 placeholder-gray-400 shadow-sm" required>
                </div>

                <div class="mt-8 pt-2">
                    <button type="submit" class="w-full bg-gradient-to-r from-[#5CA6F8] to-[#3A82D0] hover:from-[#4999F5] hover:to-[#2B6CB0] text-white font-bold py-3.5 px-6 rounded-xl transition-all duration-300 shadow-lg hover:shadow-blue-500/40 text-[15px] tracking-wide transform hover:-translate-y-0.5">
                        ENTRAR NA CONTA
                    </button>
                </div>

                <div class="text-center mt-6 pt-2 border-t border-gray-100">
                    <p class="text-sm text-gray-600">Não tem uma conta? 
                        <a href="cadastro.html" class="font-bold text-blue-600 hover:text-blue-800 transition-colors">Cadastre-se</a>
                    </p>
                </div>
            </form>
        </div>

        <div class="hidden md:flex flex-col items-center w-64 lg:w-80 transition-transform duration-500 hover:-translate-y-3">
            <img src="./img/pato.png" alt="Mascote Pato" class="w-full object-contain drop-shadow-2xl">
        </div>
    </main>

    <script>
        // Inteligência que detecta se você está rodando no computador ou se já enviou pro ar
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:3000' 
            : 'https://backmin.vercel.app';

        async function fazerLogin() {
            const identificacao = document.getElementById('login-identificacao').value.trim();
            const senha = document.getElementById('login-senha').value;
            const alertDiv = document.getElementById('login-alert');
            const alertText = document.getElementById('alert-text');

            alertDiv.classList.add('hidden');
            alertDiv.className = 'mb-6 p-4 rounded-lg relative text-sm shadow-sm border-l-4 bg-red-50 border-red-500 text-red-700';

            if (!identificacao || !senha) {
                alertText.innerText = "Por favor, preencha todos os campos.";
                alertDiv.classList.remove('hidden');
                return;
            }

            const btnSubmit = document.querySelector('button[type="submit"]');
            try {
                btnSubmit.innerText = "ENTRANDO...";
                btnSubmit.disabled = true;

                const response = await fetch(`${API_URL}/api/auth/login`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rm: identificacao, senha: senha })
                });
                
                const result = await response.json();
                if (!response.ok) throw new Error(result.message || result.error || 'Dados incorretos!');

                if (result.success && result.aluno) {
                    localStorage.setItem('aluno_token', result.aluno.rm);
                    localStorage.setItem('aluno_rm', result.aluno.rm);
                    localStorage.setItem('aluno_nome', result.aluno.nome);
                }

                alertDiv.className = 'mb-6 p-4 rounded-lg relative text-sm shadow-sm bg-green-50 border-l-4 border-green-500 text-green-800';
                alertText.innerText = "Login efetuado com sucesso! Redirecionando...";
                alertDiv.classList.remove('hidden');

                setTimeout(() => { window.location.href = 'index.html'; }, 800);

            } catch (error) {
                alertText.innerText = error.message;
                alertDiv.classList.remove('hidden');
                btnSubmit.innerText = "ENTRAR NA CONTA";
                btnSubmit.disabled = false;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('aluno_token')) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
