<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Integração SESI-SENAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-blue-50 via-[#E3F2FD] to-blue-100 min-h-screen flex flex-col text-gray-800 m-0 p-0 bg-no-repeat bg-fixed">

    <header class="bg-gradient-to-r from-[#2C558A] to-[#5BA3F6] border-t-[8px] border-[#282D35] w-full py-7 text-center text-white shadow-md">
        <h2 class="text-[13px] md:text-sm font-semibold tracking-[0.25em] text-blue-100 uppercase mb-2">Integração Sesi-Senai</h2>
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight drop-shadow-md">Crie sua Conta</h1>
    </header>

    <main class="flex-1 flex items-center justify-center p-6 w-full max-w-5xl mx-auto gap-8 lg:gap-16">
        
        <div class="bg-white/80 backdrop-blur-lg p-8 md:p-10 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-white w-full max-w-md relative transition-all duration-300">
            
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-blue-900 mb-1">Cadastre-se</h2>
                <p class="text-sm text-gray-600">Preencha os campos para criar seu perfil de leitura.</p>
            </div>

            <div id="cadastro-alert" class="hidden mb-6 p-4 rounded-lg relative text-sm shadow-sm border-l-4" role="alert">
                <span class="block sm:inline font-medium" id="cadastro-alert-text"></span>
            </div>

            <form id="cadastro-form" onsubmit="event.preventDefault(); fazerCadastro();" class="space-y-4">
                
                <div>
                    <label for="cad-nome" class="block text-xs font-semibold text-blue-900 mb-1 ml-1">Nome Completo</label>
                    <input type="text" id="cad-nome" placeholder="Digite seu nome completo" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm transition-all bg-gray-50/50" required>
                </div>

                <div>
                    <label for="cad-identificacao" class="block text-xs font-semibold text-blue-900 mb-1 ml-1">E-mail Institucional ou RM</label>
                    <input type="text" id="cad-identificacao" placeholder="exemplo@aluno.senai.br/@portalsesisp.org.br ou RM" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm transition-all bg-gray-50/50" required>
                </div>

                <div>
                    <label for="cad-senha" class="block text-xs font-semibold text-blue-900 mb-1 ml-1">Crie uma Senha</label>
                    <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm transition-all bg-gray-50/50" required>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div class="col-span-1">
                        <label for="cad-estado" class="block text-xs font-semibold text-blue-900 mb-1 ml-1">UF</label>
                        <select id="cad-estado" onchange="atualizarUnidadesCadastro()" class="w-full px-2 py-2.5 rounded-xl border border-gray-200 outline-none bg-gray-50/50 text-xs text-gray-700 shadow-sm focus:ring-2 focus:ring-blue-400" required>
                            <option value="">Selecione</option>
                            <option value="SP">SP</option><option value="RJ">RJ</option><option value="MG">MG</option><option value="ES">ES</option><option value="PR">PR</option><option value="SC">SC</option><option value="RS">RS</option><option value="DF">DF</option><option value="GO">GO</option><option value="MT">MT</option><option value="MS">MS</option><option value="AL">AL</option><option value="BA">BA</option><option value="CE">CE</option><option value="MA">MA</option><option value="PB">PB</option><option value="PE">PE</option><option value="PI">PI</option><option value="RN">RN</option><option value="SE">SE</option><option value="AC">AC</option><option value="AM">AM</option><option value="AP">AP</option><option value="PA">PA</option><option value="RO">RO</option><option value="RR">RR</option><option value="TO">TO</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label for="cad-unidade" class="block text-xs font-semibold text-blue-900 mb-1 ml-1">Unidade Escolar</label>
                        <select id="cad-unidade" disabled class="w-full px-3 py-2.5 rounded-xl border border-gray-200 outline-none bg-gray-50/50 text-xs text-gray-700 shadow-sm focus:ring-2 focus:ring-blue-400 cursor-not-allowed" required>
                            <option value="">Selecione a UF primeiro</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label for="cad-turma" class="block text-xs font-semibold text-blue-900 mb-1 ml-1">Turma / Ano</label>
                    <select id="cad-turma" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 outline-none bg-gray-50/50 text-xs text-gray-700 shadow-sm focus:ring-2 focus:ring-blue-400" required>
                        <option value="">Selecione sua turma</option>
                        
                        <optgroup label="Ensino Fundamental I (1º ao 5º)">
                            <option value="1 EFI A">1º Ano E.F. I - A</option><option value="1 EFI B">1º Ano E.F. I - B</option><option value="1 EFI C">1º Ano E.F. I - C</option><option value="1 EFI D">1º Ano E.F. I - D</option><option value="1 EFI E">1º Ano E.F. I - E</option>
                            <hr class="my-1">
                            <option value="2 EFI A">2º Ano E.F. I - A</option><option value="2 EFI B">2º Ano E.F. I - B</option><option value="2 EFI C">2º Ano E.F. I - C</option><option value="2 EFI D">2º Ano E.F. I - D</option><option value="2 EFI E">2º Ano E.F. I - E</option>
                            <hr class="my-1">
                            <option value="3 EFI A">3º Ano E.F. I - A</option><option value="3 EFI B">3º Ano E.F. I - B</option><option value="3 EFI C">3º Ano E.F. I - C</option><option value="3 EFI D">3º Ano E.F. I - D</option><option value="3 EFI E">3º Ano E.F. I - E</option>
                            <hr class="my-1">
                            <option value="4 EFI A">4º Ano E.F. I - A</option><option value="4 EFI B">4º Ano E.F. I - B</option><option value="4 EFI C">4º Ano E.F. I - C</option><option value="4 EFI D">4º Ano E.F. I - D</option><option value="4 EFI E">4º Ano E.F. I - E</option>
                            <hr class="my-1">
                            <option value="5 EFI A">5º Ano E.F. I - A</option><option value="5 EFI B">5º Ano E.F. I - B</option><option value="5 EFI C">5º Ano E.F. I - C</option><option value="5 EFI D">5º Ano E.F. I - D</option><option value="5 EFI E">5º Ano E.F. I - E</option>
                        </optgroup>

                        <optgroup label="Ensino Fundamental II (6º ao 9º)">
                            <option value="6 EF A">6º Ano E.F. II - A</option><option value="6 EF B">6º Ano E.F. II - B</option><option value="6 EF C">6º Ano E.F. II - C</option><option value="6 EF D">6º Ano E.F. II - D</option><option value="6 EF E">6º Ano E.F. II - E</option>
                            <hr class="my-1">
                            <option value="7 EF A">7º Ano E.F. II - A</option><option value="7 EF B">7º Ano E.F. II - B</option><option value="7 EF C">7º Ano E.F. II - C</option><option value="7 EF D">7º Ano E.F. II - D</option><option value="7 EF E">7º Ano E.F. II - E</option>
                            <hr class="my-1">
                            <option value="8 EF A">8º Ano E.F. II - A</option><option value="8 EF B">8º Ano E.F. II - B</option><option value="8 EF C">8º Ano E.F. II - C</option><option value="8 EF D">8º Ano E.F. II - D</option><option value="8 EF E">8º Ano E.F. II - E</option>
                            <hr class="my-1">
                            <option value="9 EF A">9º Ano E.F. II - A</option><option value="9 EF B">9º Ano E.F. II - B</option><option value="9 EF C">9º Ano E.F. II - C</option><option value="9 EF D">9º Ano E.F. II - D</option><option value="9 EF E">9º Ano E.F. II - E</option>
                        </optgroup>

                        <optgroup label="Ensino Médio">
                            <option value="1 EM A">1º Ano E.M. - A</option><option value="1 EM B">1º Ano E.M. - B</option><option value="1 EM C">1º Ano E.M. - C</option><option value="1 EM D">1º Ano E.M. - D</option><option value="1 EM E">1º Ano E.M. - E</option>
                            <hr class="my-1">
                            <option value="2 EM A">2º Ano E.M. - A</option><option value="2 EM B">2º Ano E.M. - B</option><option value="2 EM C">2º Ano E.M. - C</option><option value="2 EM D">2º Ano E.M. - D</option><option value="2 EM E">2º Ano E.M. - E</option>
                            <hr class="my-1">
                            <option value="3 EM A">3º Ano E.M. - A</option><option value="3 EM B">3º Ano E.M. - B</option><option value="3 EM C">3º Ano E.M. - C</option><option value="3 EM D">3º Ano E.M. - D</option><option value="3 EM E">3º Ano E.M. - E</option>
                        </optgroup>
                    </select>
                </div>

                <div class="mt-6">
                    <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-blue-700 hover:from-blue-600 hover:to-blue-800 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg text-[15px]">
                        CRIAR MINHA CONTA
                    </button>
                </div>

                <div class="text-center mt-4">
                    <p class="text-sm text-gray-600">Já possui cadastro? 
                        <a href="login.html" class="font-bold text-blue-600 hover:text-blue-800 transition-colors">Fazer Login</a>
                    </p>
                </div>
            </form>
        </div>

        <div class="hidden md:flex flex-col items-center w-64 lg:w-80">
            <img src="./img/pato.png" alt="Mascote Pato" class="w-full object-contain drop-shadow-2xl">
        </div>
    </main>

            "GO": `<optgroup label="SESI - Goiás"><option value="SESI Goiânia">SESI Goiânia</option><option value="SESI Anápolis">SESI Anápolis</option></optgroup><optgroup label="SENAI - Goiás"><option value="SENAI Goiânia">SENAI Goiânia</option><option value="SENAI FATEG Anápolis">SENAI Anápolis</option></optgroup>`,

            "AM": `<optgroup label="SESI - Amazonas"><option value="SESI Manaus">SESI Manaus</option></optgroup><optgroup label="SENAI - Amazonas"><option value="SENAI Manaus (Distrito Industrial)">SENAI Manaus</option></optgroup>`,
            "AP": `<optgroup label="SESI & SENAI - Amapá"><option value="SESI Macapá">SESI Macapá</option><option value="SENAI Macapá">SENAI Macapá</option><option value="SENAI Santana">SENAI Santana</option></optgroup>`,
            "PA": `<optgroup label="SESI - Pará"><option value="SESI Belém">SESI Belém</option><option value="SESI Ananindeua">SESI Ananindeua</option></optgroup><optgroup label="SENAI - Pará"><option value="SENAI Belém">SENAI Belém</option><option value="SENAI Marabá">SENAI Marabá</option></optgroup>`,
            "RO": `<optgroup label="SESI & SENAI - Rondônia"><option value="SESI Porto Velho">SESI Porto Velho</option><option value="SENAI Porto Velho">SENAI Porto Velho</option><option value="SENAI Ji-Paraná">SENAI Ji-Paraná</option></optgroup>`,

            "TO": `<optgroup label="SESI & SENAI - Tocantins"><option value="SESI Palmas">SESI Palmas</option><option value="SESI Araguaína">SESI Araguaína</option><option value="SENAI Palmas">SENAI Palmas</option></optgroup>`
        };

        function atualizarUnidadesCadastro() {
            const estadoSelect = document.getElementById('cad-estado');
            const unidadeSelect = document.getElementById('cad-unidade');
            const estado = estadoSelect.value;

            if (estado && unidadesPorEstado[estado]) {
                unidadeSelect.innerHTML = '<option value="">Selecione a Unidade</option>' + unidadesPorEstado[estado];
                unidadeSelect.disabled = false;
                unidadeSelect.classList.remove('cursor-not-allowed');
            } else {
                unidadeSelect.innerHTML = '<option value="">Selecione a UF primeiro</option>';
                unidadeSelect.disabled = true;
                unidadeSelect.classList.add('cursor-not-allowed');
            }
        }

        // URL INTELIGENTE DA API CORRIGIDA PARA ATIVAR O REWRITE DA VERCEL
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:3000/api' 
            : '/api';

        async function fazerCadastro() {
            const nome = document.getElementById('cad-nome').value.trim();
            const identificacao = document.getElementById('cad-identificacao').value.trim();
            const senha = document.getElementById('cad-senha').value;
            const estado = document.getElementById('cad-estado').value;
            const unidade = document.getElementById('cad-unidade').value;
            const turma = document.getElementById('cad-turma').value;
            
            const alertDiv = document.getElementById('cadastro-alert');
            const alertText = document.getElementById('cadastro-alert-text');

            alertDiv.classList.add('hidden');
            alertDiv.className = 'mb-6 p-4 rounded-lg relative text-sm shadow-sm border-l-4 bg-red-50 border-red-500 text-red-700';

            if (senha.length < 6) {
                alertText.innerText = "A senha deve ter pelo menos 6 caracteres.";
                alertDiv.classList.remove('hidden');
                return;
            }

            const btnSubmit = document.querySelector('button[type="submit"]');
            try {
                btnSubmit.innerText = "CRIANDO CONTA...";
                btnSubmit.disabled = true;

                // Faz a requisição enviando para a rota unificada
                const response = await fetch(`${API_URL}/auth/register`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        nome, 
                        rm: identificacao, 
                        senha,
                        estado,
                        unidade,
                        turma
                    })
                });
                
                const result = await response.json();
                if (!response.ok) throw new Error(result.message || result.error || 'Erro ao efetuar o cadastro.');

                alertDiv.className = 'mb-6 p-4 rounded-lg relative text-sm shadow-sm bg-green-50 border-l-4 border-green-500 text-green-800';
                alertText.innerText = "Conta criada com sucesso! Redirecionando para o login...";
                alertDiv.classList.remove('hidden');

                setTimeout(() => { window.location.href = 'login.html'; }, 1500);

            } catch (error) {
                alertText.innerText = error.message;
                alertDiv.classList.remove('hidden');
                btnSubmit.innerText = "CRIAR MINHA CONTA";
                btnSubmit.disabled = false;
            }
        }
    </script>
</body>
</html>
