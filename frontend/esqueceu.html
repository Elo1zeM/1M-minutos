<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Integração SESI-SENAI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-blue-50 via-[#E3F2FD] to-blue-100 min-h-screen flex flex-col text-gray-800 selection:bg-blue-200 m-0 p-0 bg-no-repeat bg-fixed"></body>

    <header class="bg-gradient-to-r from-[#2C558A] to-[#5BA3F6] border-t-[8px] border-[#282D35] w-full py-7 text-center text-white shadow-md">
        <h2 class="text-[13px] md:text-sm font-semibold tracking-[0.25em] text-blue-100 uppercase mb-2">
            Integração Sesi-Senai
        </h2>
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight drop-shadow-md">
            1 Milhão de Minutos de Leitura
        </h1>
    </header>

    <main class="flex-1 flex items-center justify-center p-6 w-full max-w-5xl mx-auto gap-8 lg:gap-16">
        
        <div class="bg-white/80 backdrop-blur-lg p-8 md:p-10 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-white w-full max-w-md relative transition-all duration-300">
            
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-blue-900 mb-2">Esqueceu a senha?</h2>
                <p class="text-sm text-gray-600">Digite seu E-mail Institucional ou RM abaixo. Enviaremos as instruções para você redefinir sua senha.</p>
            </div>

            <div id="recuperacao-alert" class="hidden mb-6 p-4 rounded-lg relative text-sm shadow-sm" role="alert">
                <span class="block sm:inline font-medium" id="alert-text"></span>
            </div>

            <form id="recuperar-form" onsubmit="event.preventDefault(); enviarRecuperacao();" class="space-y-5">
                
                <div>
                    <label for="recuperar-identificacao" class="block text-sm font-semibold text-blue-900 mb-1.5 ml-1">
                        E-mail Institucional / RM
                    </label>
                    <input type="text" id="recuperar-identificacao" placeholder="exemplo@aluno.sesisenai.br ou RM" 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none transition-all bg-gray-50/50 text-gray-700 placeholder-gray-400 shadow-sm" required>
                </div>

                <div class="mt-8 pt-2 space-y-3">
                    <button type="submit" id="btn-enviar"
                        class="w-full bg-gradient-to-r from-[#5CA6F8] to-[#3A82D0] hover:from-[#4999F5] hover:to-[#2B6CB0] text-white font-bold py-3.5 px-6 rounded-xl transition-all duration-300 shadow-lg hover:shadow-blue-500/40 text-[15px] tracking-wide transform hover:-translate-y-0.5">
                        ENVIAR INSTRUÇÕES
                    </button>
                    
                    <a href="login.html" 
                        class="flex w-full justify-center items-center text-blue-600 font-semibold py-3 px-6 rounded-xl border-2 border-blue-100 hover:bg-blue-50 transition-all duration-300 text-[15px]">
                        Voltar para o Login
                    </a>
                </div>
            </form>
        </div>

        <div class="hidden md:flex flex-col items-center w-64 lg:w-80 transition-transform duration-500 hover:-translate-y-3">
            <img src="./img/pato.png" alt="Mascote Pato" class="w-full object-contain drop-shadow-2xl">
        </div>

    </main>

    <script>
        // Função para simular o envio da recuperação de senha
        function enviarRecuperacao() {
            const identificacao = document.getElementById('recuperar-identificacao').value.trim();
            const alertDiv = document.getElementById('recuperacao-alert');
            const alertText = document.getElementById('alert-text');
            const btnEnviar = document.getElementById('btn-enviar');

            // Esconde alertas anteriores e reseta as classes
            alertDiv.classList.add('hidden');
            alertDiv.className = 'hidden mb-6 p-4 rounded-lg relative text-sm shadow-sm';

            if (!identificacao) {
                // Alerta de erro
                alertDiv.classList.add('bg-red-50', 'border-l-4', 'border-red-500', 'text-red-700');
                alertText.innerText = "Por favor, preencha seu E-mail ou RM.";
                alertDiv.classList.remove('hidden');
                
                // Tremor
                alertDiv.classList.add('animate-bounce');
                setTimeout(() => alertDiv.classList.remove('animate-bounce'), 1000);
                return;
            }

            // Muda o botão para "Enviando..."
            btnEnviar.innerText = "ENVIANDO...";
            btnEnviar.classList.add('opacity-80', 'cursor-not-allowed');

            /* * AQUI VOCÊ DEVERÁ CONECTAR COM A SUA API DO BACKEND FUTURAMENTE
             * Exemplo: await fetch(`${API_URL}/esqueci-senha`, { ... })
             */

            // Simulando um pequeno tempo de carregamento da rede
            setTimeout(() => {
                // Alerta de Sucesso
                alertDiv.classList.remove('hidden');
                alertDiv.classList.add('bg-green-50', 'border-l-4', 'border-green-500', 'text-green-800');
                alertText.innerText = "Se o seu RM/E-mail estiver cadastrado, você receberá um link com as instruções em instantes.";
                
                // Restaura o botão e limpa o input
                btnEnviar.innerText = "ENVIAR INSTRUÇÕES";
                btnEnviar.classList.remove('opacity-80', 'cursor-not-allowed');
                document.getElementById('recuperar-identificacao').value = "";
            }, 1500);
        }
    </script>
</body>
</html>
